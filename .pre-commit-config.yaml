repos:
-   repo: https://github.com/Yelp/detect-secrets
    rev: 01886c8a910c64595c47f186ca1ffc0b77fa5458  # frozen-string-literal: v1.5.0
    hooks:
    -   id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: pnpm-lock\.yaml
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen-string-literal: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: check-shebang-scripts-are-executable
    -   id: detect-private-key
    -   id: end-of-file-fixer
    -   id: mixed-line-ending
        args: [--fix=lf]
-   repo: local
    hooks:
    -   id: forbid-aws-arn-account-ids
        name: Forbid AWS account IDs inside ARNs
        description: |
          Matches `arn:aws...:<region>:<12-digits>:...` literals. Replace the
          account ID with a placeholder (e.g. `<ACCOUNT_ID>`) before committing.
        language: pygrep
        entry: 'arn:aws[a-z\-]*:[a-z0-9\-]*:[a-z0-9\-]*:[0-9]{12}:'
        types: [text]
        exclude: '^\.secrets\.baseline$|^\.pre-commit-config\.yaml$'
